<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        {% block style %}
        body {
            padding-bottom: 70px;
            background: #f5f7fb;
        }
        .logo {
            font-weight: bold;
            font-size: 20px;
        }
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 60px;
            z-index: 1000;
        }
        .mobile-nav a {
            text-decoration: none;
            color: #555;
            font-size: 14px;
            text-align: center;
        }
        .fab-btn {
            width: 55px;
            height: 55px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            margin-top: -30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        @media (min-width: 768px) {
            .mobile-nav { display: none; }
        }
        @media (max-width: 767px) {
            .desktop-nav { display: none; }
        }
    {% endblock %}
    </style>

</head>

<body>


<!-- DESKTOP NAV -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm desktop-nav">
    <div class="container-fluid">
        <span class="logo">Crown Royal</span>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="{% url 'home' %}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'patient_view' %}">Patient List</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Upcoming</a>
            </li>
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Manage</a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="{% url 'create_patient' %}">Register</a></li>
                    <li><a class="dropdown-item" href="#">Appointment</a></li>
                    <li><a class="dropdown-item" href="{% url 'procedure_panel' %}">Services</a></li>
                </ul>
            </li>
        </ul>
    </div>
</nav>

<!-- MOBILE NAV -->
<div class="mobile-nav">
    <a href="{% url 'home' %}"><i class="bi bi-house fs-5"></i><br>Home</a>
    <a href="#"><i class="bi bi-people fs-5"></i><br>Patients</a>
    <div class="fab-btn" data-bs-toggle="modal" data-bs-target="#manageModal">+</div>
    <a href="#"><i class="bi bi-calendar-event fs-5"></i><br>Upcoming</a>
    <a href="#"><i class="bi bi-person fs-5"></i><br>Profile</a>
</div>

<!-- MODAL -->
<div class="modal fade" id="manageModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">
            <h5 class="mb-3">Manage</h5>
            <a href="{% url 'create_patient' %}" class="btn btn-primary w-100 mb-2">Register</a>
            <a href="#" class="btn btn-outline-primary w-100">Appointment</a>
            <a href="{% url 'procedure_panel' %}" class="btn btn-primary w-100 mb-2">Services</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
