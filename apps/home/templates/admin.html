<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="card shadow-sm">
    <div class="card-body">

      <!-- Tabs -->
      <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#procedure">Procedure</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#prescription">Prescription Template</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#medicine">Medicine</button>
        </li>
      </ul>

      <div class="tab-content pt-3">

        <!-- Procedure -->
        <div class="tab-pane fade show active" id="procedure">
          <div class="d-flex justify-content-between mb-2">
            <h6>Procedure List</h6>
            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#procedureModal">
              <i class="bi bi-plus"></i> Add
            </button>
          </div>
          <div class="table-responsive">
            <table class="table table-bordered">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Description</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>Cleaning</td>
                  <td>Dental cleaning</td>
                  <td class="text-end">
                    <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" data-bs-target="#editModal"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i></button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Prescription -->
        <div class="tab-pane fade" id="prescription">
          <div class="d-flex justify-content-between mb-2">
            <h6>Prescription Templates</h6>
            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#prescriptionModal">
              <i class="bi bi-plus"></i> Add
            </button>
          </div>
        </div>

        <!-- Medicine -->
        <div class="tab-pane fade" id="medicine">
          <div class="d-flex justify-content-between mb-2">
            <h6>Medicine List</h6>
            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#medicineModal">
              <i class="bi bi-plus"></i> Add
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- ADD MODALS -->
<div class="modal fade" id="procedureModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Procedure</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input class="form-control mb-2" placeholder="Procedure name">
        <textarea class="form-control" placeholder="Description"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="showToast('Procedure added')">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="prescriptionModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Prescription Template</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input class="form-control mb-2" placeholder="Template name">
        <textarea class="form-control" placeholder="Notes"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="showToast('Template added')">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="medicineModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Medicine</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input class="form-control mb-2" placeholder="Medicine name">
        <input class="form-control" placeholder="Dosage">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="showToast('Medicine added')">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- EDIT / DELETE -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5>Edit Item</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body"><input class="form-control mb-2"><textarea class="form-control"></textarea></div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-success" onclick="showToast('Updated')">Update</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5>Confirm Delete</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">Are you sure?</div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-danger" onclick="showToast('Deleted')">Delete</button></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div id="toast" class="toast text-bg-success"><div class="toast-body" id="toastMsg"></div></div>
</div>

<script>
function showToast(msg){
  document.getElementById('toastMsg').innerText = msg;
  new bootstrap.Toast(document.getElementById('toast')).show();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
