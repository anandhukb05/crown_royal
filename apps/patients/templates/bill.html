<!DOCTYPE html>
<html>
<head>
    <title>Dental Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container my-4">

<form method="post">
{% csrf_token %}

<!-- HEADER -->
<div class="border p-3">

    <div class="text-center mb-3">
        <h2 class="fw-bold text-warning">CROWN ROYALE</h2>
        <h5 class="text-dark">DENTAL CARE</h5>
        <small>
            Opp. Bharath Matha College, Thrikkakara, Kakkanad, Kochi<br>
            Ph: 89 433 433 68
        </small>
    </div>

    <h4 class="text-center bg-warning text-dark p-2">Dental Invoice</h4>

    <!-- Invoice Row -->
    <div class="row mt-3">
        <div class="col-md-4">
            <label>Invoice No</label>
            <input type="text" name="invoice_no" class="form-control" value="{{ invoice_no }}">
        </div>

        <div class="col-md-4">
            <label>Date</label>
            <input type="date" name="date" class="form-control" value="{{ today }}">
        </div>
    </div>

    <!-- Patient Info -->
    <div class="row mt-3">
        <div class="col-md-6">
            <label>Patient Name</label>
            <input type="text" name="patient_name" class="form-control" value="{{patient.name}}" disabled>
        </div>

        <div class="col-md-3">
            <label>Age</label>
            <input type="number" name="age" class="form-control"  value="{{patient.age}}" disabled>
        </div>

        <div class="col-md-3">
            <label>Gender</label>
            <input type="text" name="gender" class="form-control"  value="{{ patient.gender }}" disabled>
            
        </div>
    </div>

    <div class="mt-3">
        <label>Address</label>
       <textarea name="address" class="form-control" disabled rows=5>
            {{ patient.address }}
            {{ patient.state }}
            {{ patient.pincode }}
        </textarea>
    </div>

    <div class="mt-3">
        <label>Contact Number</label>
        <input type="text" name="contact" class="form-control" value="{{patient.phno}}" disabled>
    </div>

    <!-- Payment Mode -->
    <div class="mt-3">
        <label class="fw-bold">Mode of Payment</label><br>
        <input type="checkbox" name="payment_mode" value="cash"> Cash
        <input type="checkbox" name="payment_mode" value="card" class="ms-3"> Card
    </div>

</div>

<!-- TREATMENT TABLE -->
<div class="border mt-3 p-3">

<table class="table table-bordered" id="treatmentTable">
    <thead class="table-warning">
        <tr>
            <th width="10%">Serial #</th>
            <th>Treatment Done</th>
            <th width="15%">Rate</th>
            <th width="10%">Qty</th>
            <th width="15%">Amount</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td><input type="text" name="treatment[]" class="form-control"></td>
            <td><input type="number" name="rate[]" class="form-control rate"></td>
            <td><input type="number" name="qty[]" class="form-control qty" value="1"></td>
            <td><input type="number" name="amount[]" class="form-control amount" readonly></td>
        </tr>
    </tbody>
</table>

<button type="button" class="btn btn-sm btn-warning" onclick="addRow()">Add Row</button>

</div>

<!-- TOTAL SECTION -->
<div class="border mt-3 p-3">

<div class="row">
    <div class="col-md-8">
        <label>Terms & Conditions</label>
        <textarea name="terms" class="form-control" rows="5"></textarea>
    </div>

    <div class="col-md-4">
        <label>Sub Total</label>
        <input type="number" name="subtotal" id="subtotal" class="form-control" readonly>

        <label class="mt-2">Tax %</label>
        <input type="number" name="tax" id="tax" class="form-control" value="0">

        <label class="mt-2 fw-bold">Total Bill</label>
        <input type="number" name="total" id="total" class="form-control" readonly>
    </div>
</div>

<div class="mt-3">
    <label>Amount in Words</label>
    <input type="text" name="amount_words" class="form-control">
</div>

<div class="mt-3 text-end">
    <label>Signature</label>
    <input type="text" name="signature" class="form-control w-50 ms-auto">
</div>

</div>

<div class="text-center mt-3">
    <button class="btn btn-success btn-lg">Save Invoice</button>
</div>

</form>
</div>

<!-- JS -->
<script>

function addRow() {
    let table = document.querySelector("#treatmentTable tbody");
    let rowCount = table.rows.length + 1;

    let row = table.insertRow();

    row.innerHTML = `
        <td>${rowCount}</td>
        <td><input type="text" name="treatment[]" class="form-control"></td>
        <td><input type="number" name="rate[]" class="form-control rate"></td>
        <td><input type="number" name="qty[]" class="form-control qty" value="1"></td>
        <td><input type="number" name="amount[]" class="form-control amount" readonly></td>
    `;
}

document.addEventListener("input", function() {
    let subtotal = 0;

    document.querySelectorAll("#treatmentTable tbody tr").forEach(row => {
        let rate = row.querySelector(".rate").value || 0;
        let qty = row.querySelector(".qty").value || 0;
        let amt = rate * qty;
        row.querySelector(".amount").value = amt;
        subtotal += amt;
    });

    document.getElementById("subtotal").value = subtotal;

    let tax = document.getElementById("tax").value || 0;
    document.getElementById("total").value = subtotal + (subtotal * tax / 100);
});

</script>

</body>
</html>
