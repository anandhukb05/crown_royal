<div class="modal fade" id="editProcedureModal{{ p.id }}">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">

      <form method="post" action="{% url 'patient_procedure_edit' p.id %}">
        {% csrf_token %}

        <div class="modal-header">
          <h5 class="modal-title">Edit Procedure</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <!-- Added Date -->
          <div class="mb-3">
            <label class="form-label small text-muted">Added Date</label>
            <input type="date"
                   class="form-control"
                   name="added_date"
                   value="{{ p.created_at|date:'Y-m-d' }}">
          </div>

          <!-- Procedure -->
          <div class="mb-3">
            <label class="form-label small text-muted">Procedure</label>

            <select class="form-select" required name="procedure_id" id="procedureSelect1">

              {% for proc in procedures_list %}

              <option value="{{ proc.id }}"
                {% if proc.id == p.procedure.id %}selected{% endif %}
                data-price="{{ proc.price }}">

                {{ proc.prodecure }}

              </option>

              {% endfor %}

            </select>
          </div>

          <!-- Quantity & Price -->
          <div class="row g-2 mb-3">

            <div class="col-12 col-md-6">
              <label class="form-label small text-muted">Quantity</label>
              <input type="number"
                     class="form-control"
                     name="quantity"
                     min="1"
                     value="{{ p.quantity }}"
                     id="ProcedureQuantity1">
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label small text-muted">Price</label>
              <input type="number"
                     class="form-control"
                     name="price"
                     value="{{ p.price }}"
                     id="ProcedurePrice1">
            </div>

          </div>

          <!-- Notes -->
          <div class="mb-3">
            <label class="form-label small text-muted">Notes</label>

            <textarea class="form-control"
                      rows="3"
                      name="notes">{{ p.notes }}</textarea>
          </div>

          <!-- Discount -->
          <div class="row g-2 mb-3">

            <div class="col-12 col-md-6">
              <label class="form-label small text-muted">Discount Type</label>

              <select class="form-select"
                      name="discount_type"
                      id="discount_type1">

                <option value="amount"
                  {% if p.discount_type == "amount" %}selected{% endif %}>
                  ₹ Amount
                </option>

                <option value="percentage"
                  {% if p.discount_type == "percentage" %}selected{% endif %}>
                  % Percentage
                </option>

              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label small text-muted">Discount</label>

              <input type="number"
                     class="form-control"
                     name="discount"
                     value="{{ p.discount }}"
                     id="ProcedureDiscount1">
            </div>

          </div>

          <!-- Total -->
          <div class="mb-3">

            <label class="form-label small text-muted">Total</label>

            <input type="number"
                   class="form-control"
                   name="total"
                   readonly
                   value="{{ p.total }}"
                   id="ProcedureTotal1">

          </div>

          <!-- Status -->
          <div class="mb-3">

            <label class="form-label small text-muted">Status</label>

            <select class="form-select" name="status">

              <option value="planned"
                {% if p.status == "planned" %}selected{% endif %}>
                Planned
              </option>

              <option value="completed"
                {% if p.status == "completed" %}selected{% endif %}>
                Completed
              </option>

            </select>

          </div>

        </div>

        <div class="modal-footer">

          <button type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal">
            Cancel
          </button>

          <button type="submit"
                  class="btn btn-primary">
            Update
          </button>

        </div>

      </form>

    </div>
  </div>
</div>


<script>

function calculateTotal() {

    let quantity = parseFloat(document.getElementById("ProcedureQuantity1").value);
    let price = parseFloat(document.getElementById("ProcedurePrice1").value);
    let discount = parseFloat(document.getElementById("ProcedureDiscount1").value);
    let discountType = document.getElementById("discount_type1").value;

    quantity = isNaN(quantity) ? 0 : quantity;
    price = isNaN(price) ? 0 : price;
    discount = isNaN(discount) ? 0 : discount;

    let base = quantity * price;
    let discountAmount = 0;

    if (discount > 0) {

        if (discountType === "percentage") {
            discountAmount = (base * discount) / 100;
        } else {
            discountAmount = discount;
        }

    }

    let total = base - discountAmount;

    if (total < 0) total = 0;

    document.getElementById("ProcedureTotal1").value = total.toFixed(2);
}


// procedure price auto fill
document.getElementById('procedureSelect1').addEventListener('change', function () {

    const selectedOption = this.options[this.selectedIndex];
    const price = selectedOption.getAttribute('data-price');

    document.getElementById('ProcedurePrice1').value = price ? price : '';

    calculateTotal();

});


// trigger calculations
["ProcedureQuantity1","ProcedurePrice1","ProcedureDiscount1"].forEach(id => {

    document.getElementById(id).addEventListener("input", calculateTotal);

});

document.getElementById("discount_type1").addEventListener("change", calculateTotal);


// calculate on load
document.addEventListener("DOMContentLoaded", calculateTotal);

</script>
